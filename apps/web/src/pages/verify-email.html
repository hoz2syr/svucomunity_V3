<body class="min-h-screen flex items-center justify-center p-4">
    <!-- Brand Header -->
    <div class="max-w-5xl mx-auto px-4 pt-6 pb-2 flex items-center justify-center">
        <a href="../../index.html" class="flex items-center gap-3 group" aria-label="SVU Community Home">
                <img src="/icon.svg" alt="SVU Community" class="w-15 h-15 object-contain transition-transform duration-300 group-hover:scale-105" width="60" height="60">
            <span class="text-xl font-bold gradient-text">SVU Community</span>
        </a>
    </div>
    <!-- Language & Theme Toggle -->
    <div class="fixed top-4 right-4 z-50 toggle-bar">
        <button data-lang-toggle onclick="window.i18n?.toggleLang(); location.reload();"
            class="lang-toggle-btn" aria-label="Toggle language">
            <span class="lang-icon">
                <svg class="lang-globe" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                EN
            </span>
        </button>
        <div class="toggle-divider"></div>
        <button id="themeToggleBtn" onclick="window.toggleTheme?.()"
            class="theme-toggle-btn" aria-label="Toggle theme">
            <span class="icon-wrapper">
                <svg class="icon-sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg class="icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.0 0 0012 21a9.003 9.0 0 008.354-5.646z"/>
                </svg>
                <svg class="icon-system hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 002 2v10a2 2 0 002 2z"/>
                </svg>
            </span>
        </button>
    </div>

    <div class="w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="../../index.html" class="inline-flex items-center gap-3 mb-4 group">
                <img src="/icon.svg" alt="SVU Community" class="w-15 h-15 object-contain transition-transform duration-300 group-hover:scale-105" width="60" height="60">
            </a>
            <h1 class="text-2xl font-bold gradient-text">SVU Community</h1>
            <p class="text-secondary-400 text-sm mt-2" data-i18n="verifyEmailTitle">تفعيل البريد الإلكتروني</p>
        </div>
            <h1 class="text-2xl font-bold gradient-text">SVU Community</h1>
            <p class="text-secondary-400 text-sm mt-2" data-i18n="verifyEmailTitle">تفعيل البريد الإلكتروني</p>
        </div>

        <!-- Verification Card -->
        <div class="glass rounded-2xl p-8 shadow-2xl">
            <!-- Loading State -->
            <div id="verifyLoading" class="text-center py-4">
                <div class="w-12 h-12 mx-auto mb-4 border-4 border-primary-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-secondary-300" data-i18n="verifyEmailLoading">جاري تفعيل بريدك الإلكتروني...</p>
            </div>

            <!-- Success State -->
            <div id="verifySuccess" class="hidden text-center py-4">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-green-500/20 flex items-center justify-center">
                    <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2" data-i18n="verifyEmailSuccess">تم تفعيل البريد الإلكتروني بنجاح!</h3>
                <p class="text-secondary-400 text-sm mb-4" data-i18n="verifyEmailRedirect">سيتم توجيهك لتسجيل الدخول...</p>
                <a href="login.html" class="inline-block px-6 py-2 bg-primary-600 hover:bg-primary-500 text-white rounded-xl font-semibold transition">
                    <span data-i18n="login">تسجيل الدخول</span>
                </a>
            </div>

            <!-- Error State -->
            <div id="verifyError" class="hidden text-center py-4">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-red-500/20 flex items-center justify-center">
                    <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </div>
                <h3 class="text-xl font-bold text-white mb-2" data-i18n="verifyEmailFailed">فشل تفعيل البريد الإلكتروني</h3>
                <p id="verifyErrorMsg" class="text-secondary-400 text-sm mb-4"></p>
                <div class="flex flex-col gap-3">
                    <button id="resendBtn" onclick="resendVerification()"
                        class="px-6 py-2 bg-primary-600 hover:bg-primary-500 text-white rounded-xl font-semibold transition">
                        <span data-i18n="verifyEmailResend">إعادة إرسال رابط التفعيل</span>
                    </button>
                    <a href="login.html" class="text-secondary-400 hover:text-white text-sm transition">
                        <span data-i18n="backToHome">العودة للرئيسية</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-6">
            <a href="index.html" class="text-secondary-400 hover:text-white text-sm transition flex items-center justify-center gap-2">
                <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span data-i18n="backToHome">العودة للرئيسية</span>
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 transform transition-all duration-300 z-[9999] opacity-0 translate-y-4" style="min-width: 250px;">
        <div id="toastContent" class="text-white px-6 py-3 rounded-xl shadow-2xl border text-center font-medium"></div>
    </div>

    <script src="env.js"></script>
    <script src="js/window-shim.js"></script>
    <script src="js/config.js"></script>

</html>
