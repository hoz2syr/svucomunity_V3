<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="registerTitle">إنشاء حساب - SVU Community</title>
    <meta name="description" content="إنشاء حساب جديد في SVU Community">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f172a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://*.supabase.com 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com blob:; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.com wss://*.supabase.co wss://*.supabase.com; base-uri 'self';">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="alternate icon" href="/icon.ico">
    <link rel="stylesheet" href="../styles.css">

    <script src="../../env.js"></script>
    <script type="module" src="../app.js"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 py-8">

    <div class="fixed top-4 right-4 z-50 toggle-bar">
        <button data-lang-toggle class="lang-toggle-btn" aria-label="Toggle language">
            <span class="lang-icon">
                <svg class="lang-globe" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                EN
            </span>
        </button>
        <div class="toggle-divider"></div>
        <button id="themeToggleBtn" class="theme-toggle-btn" aria-label="Toggle theme">
            <span class="icon-wrapper">
                <svg class="icon-sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg class="icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                <svg class="icon-system hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 002 2v10a2 2 0 002 2z"/>
                </svg>
            </span>
        </button>
    </div>

    <div class="w-full max-w-2xl">

        <!-- Logo -->
        <div class="text-center mb-6">
            <a href="index.html" class="inline-flex items-center gap-3 mb-2 group">
                <img src="/icon.svg" alt="SVU Community" class="w-15 h-15 object-contain transition-transform duration-300 group-hover:scale-105" width="60" height="60">
            </a>
            <h1 class="text-xl font-bold gradient-text">إنشاء حساب جديد</h1>
            <p class="text-secondary-400 text-sm mt-1">انضم لمجتمع تقنية المعلومات</p>
        </div>

        <!-- Card -->
        <div class="glass rounded-2xl p-6 shadow-2xl">
            <form id="registerForm" class="space-y-5" novalidate>

                <!-- Username -->
                <div>
                    <label class="block text-secondary-300 text-sm mb-2">
                        اسم المستخدم الجامعي <span class="text-primary-400">*</span>
                    </label>
                    <div class="relative">
                        <input type="text" id="username" required autocomplete="username"
                               pattern="[a-zA-Z]+_\d{6}"
                               class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500"
                               placeholder="name_123456">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary-500 pointer-events-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                    </div>
                    <p class="text-secondary-500 text-xs mt-1">مثال: ahmed_123456</p>
                </div>

                <!-- Full Name -->
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-secondary-300 text-sm mb-2">الاسم الأول <span class="text-primary-400">*</span></label>
                        <input type="text" id="firstName" required autocomplete="given-name"
                               class="input-field w-full px-3 py-3 rounded-xl text-white placeholder-secondary-500 text-center"
                               placeholder="أحمد">
                    </div>
                    <div>
                        <label class="block text-secondary-300 text-sm mb-2">اسم الأب <span class="text-primary-400">*</span></label>
                        <input type="text" id="middleName" required autocomplete="additional-name"
                               class="input-field w-full px-3 py-3 rounded-xl text-white placeholder-secondary-500 text-center"
                               placeholder="محمد">
                    </div>
                    <div>
                        <label class="block text-secondary-300 text-sm mb-2">اسم العائلة <span class="text-primary-400">*</span></label>
                        <input type="text" id="lastName" required autocomplete="family-name"
                               class="input-field w-full px-3 py-3 rounded-xl text-white placeholder-secondary-500 text-center"
                               placeholder="علي">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-secondary-300 text-sm mb-2">
                        البريد الإلكتروني <span class="text-primary-400">*</span>
                    </label>
                    <div class="relative">
                        <input type="email" id="email" required autocomplete="email" dir="ltr"
                               class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 pl-12"
                               placeholder="name@university.edu">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary-500 pointer-events-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 002 2v10a2 2 0 002-2z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Major -->
                <div class="relative" id="majorWrapper">
                    <label class="block text-secondary-300 text-sm mb-2">التخصص <span class="text-primary-400">*</span></label>

                    <div class="relative">
                        <input type="text" id="majorInput" required autocomplete="off"
                               class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 cursor-pointer"
                               placeholder="ابحث عن التخصص...">
                        <div class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary-500 pointer-events-none">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 002 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                        </div>
                        <svg class="absolute left-12 top-1/2 -translate-y-1/2 w-4 h-4 text-secondary-400 transition-transform duration-200"
                             id="majorArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </div>

                    <div id="majorMenu" class="absolute top-full mt-2 left-0 right-0 z-40 hidden">
                        <div class="rounded-xl overflow-hidden border border-secondary-600 max-h-72 overflow-y-auto">
                            <ul id="majorList" class="py-1" role="listbox"></ul>
                        </div>
                    </div>

                    <p id="majorError" class="text-red-400 text-xs mt-1 hidden">الرجاء اختيار التخصص</p>
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-secondary-300 text-sm mb-1">
                        رقم الهاتف <span class="text-primary-400">*</span>
                    </label>
                    <p id="phoneHint" class="text-secondary-500 text-xs mb-2"></p>

                    <div class="flex gap-2 items-stretch">
                        <div class="relative flex-shrink-0 w-44" id="countryWrapper">
                            <button type="button" id="countryBtn"
                                    class="input-field w-full h-full px-3 py-3 rounded-xl text-white flex items-center gap-2 cursor-pointer hover:border-primary-500 transition min-h-[48px]"
                                    aria-haspopup="listbox" aria-expanded="false">
                                <span id="selFlag" class="text-xl leading-none">🇸🇾</span>
                                <span id="selDial" class="text-secondary-300 text-sm font-mono">+963</span>
                                <svg id="dropArrow" class="w-4 h-4 text-secondary-400 ms-auto flex-shrink-0"
                                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                                </svg>
                            </button>

                            <div id="countryMenu"
                                 class="absolute top-full mt-1 left-0 right-0 z-50 min-w-[265px]"
                                 role="listbox" aria-label="اختر الدولة">
                                <div class="rounded-xl overflow-hidden border border-secondary-600 shadow-2xl">
                                    <div class="p-2 border-b border-secondary-700">
                                        <input type="text" id="countrySearch" dir="rtl" autocomplete="off"
                                               class="w-full px-3 py-2 bg-secondary-800 rounded-lg text-white text-sm outline-none border border-secondary-600 focus:border-primary-500 transition placeholder-secondary-500"
                                               placeholder="🔍 ابحث عن الدولة...">
                                    </div>
                                    <ul id="countryList" class="c-list py-1" role="listbox"></ul>
                                    <p id="noResult" class="hidden text-center text-secondary-500 text-sm py-3">لا توجد نتائج</p>
                                </div>
                            </div>
                        </div>

                        <div class="flex-1 relative">
                            <span id="phoneStatus" class="text-secondary-500"></span>
                            <input type="tel" id="phone" required autocomplete="tel"
                                   class="input-field w-full py-3 pr-4 rounded-xl text-white placeholder-secondary-500"
                                   placeholder="0933 xxx xxx" maxlength="22">
                        </div>
                    </div>

                    <div class="flex items-center justify-between mt-1.5 min-h-[18px]">
                        <p id="phoneError" class="text-red-400 text-xs hidden">⚠ رقم الهاتف غير صالح</p>
                        <p id="phoneInfo" class="text-secondary-500 text-xs ms-auto"></p>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-secondary-300 text-sm mb-2">
                        كلمة المرور <span class="text-primary-400">*</span>
                    </label>
                    <div class="relative">
                        <input type="password" id="password" required minlength="8" autocomplete="new-password"
                               class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 pl-12"
                               placeholder="••••••••">
                        <button type="button" id="togglePwd"
                                class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary-400 hover:text-white transition"
                                aria-label="إظهار/إخفاء">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="flex gap-1.5 mt-2">
                        <div class="s-bar"><div id="s1" class="s-fill"></div></div>
                        <div class="s-bar"><div id="s2" class="s-fill"></div></div>
                        <div class="s-bar"><div id="s3" class="s-fill"></div></div>
                        <div class="s-bar"><div id="s4" class="s-fill"></div></div>
                    </div>
                    <p id="strengthLabel" class="text-secondary-500 text-xs mt-1">8 أحرف على الأقل</p>
                </div>

                <!-- Confirm Password -->
                <div>
                    <label class="block text-secondary-300 text-sm mb-2">
                        تأكيد كلمة المرور <span class="text-primary-400">*</span>
                    </label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" required autocomplete="new-password"
                               class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 pl-12"
                               placeholder="••••••••">
                        <button type="button" id="toggleConfirm"
                                class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary-400 hover:text-white transition"
                                aria-label="إظهار/إخفاء">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <p id="matchMsg" class="text-red-400 text-xs mt-1 hidden">كلمتا المرور غير متطابقتين</p>
                </div>

                <!-- Terms -->
                <div class="flex items-start gap-3">
                    <input type="checkbox" id="terms" required
                           class="w-4 h-4 mt-1 rounded border-secondary-600 bg-secondary-800 text-primary-500 cursor-pointer">
                    <label for="terms" class="text-secondary-300 text-sm cursor-pointer">
                        أوافق على
                        <a href="#" class="text-primary-400 hover:text-primary-300">الشروط والأحكام</a>
                        و<a href="#" class="text-primary-400 hover:text-primary-300">سياسة الخصوصية</a>
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" id="registerBtn"
                        class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 disabled:opacity-50 disabled:cursor-not-allowed">
                    إنشاء حساب
                </button>
            </form>

            <div class="mt-6 text-center">
                <span class="text-secondary-400 text-sm">لديك حساب بالفعل؟ </span>
                <a href="login.html" class="text-primary-400 hover:text-primary-300 text-sm font-semibold transition">تسجيل الدخول</a>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="text-secondary-400 hover:text-white text-sm transition flex items-center justify-center gap-2">
                <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span data-i18n="backToHome">العودة للرئيسية</span>
            </a>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 transition-all duration-300 opacity-0 translate-y-4 z-50 pointer-events-none">
        <div id="toastContent" class="px-5 py-3 rounded-xl shadow-2xl text-white text-sm font-medium"></div>
    </div>
</body>
</html>
