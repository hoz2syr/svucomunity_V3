<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="loginTitle">تسجيل الدخول - SVU Community</title>
    <meta name="description" content="تسجيل الدخول إلى SVU Community">
    <meta name="keywords" content="تسجيل الدخول، SVU Community، مجتمع جامعي، تقنية المعلومات">
    <meta name="author" content="SVU Community">
    <meta property="og:title" content="تسجيل الدخول - SVU Community">
    <meta property="og:description" content="تسجيل الدخول إلى SVU Community">
    <meta property="og:image" content="/icon.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="تسجيل الدخول - SVU Community">
    <meta name="twitter:description" content="تسجيل الدخول إلى SVU Community">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0f172a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://*.supabase.com 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com blob:; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.com wss://*.supabase.co wss://*.supabase.com; base-uri 'self';">

    <script type="module" src="../../env.js"></script>
    <script type="module" src="../js/modules/window-shim.js"></script>
    <script type="module" src="../app.js"></script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="alternate icon" href="/icon.ico">
    <link rel="stylesheet" href="/vendor/fonts/cairo.css">
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:right-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-primary-600 focus:text-white focus:rounded-xl">تخطي إلى المحتوى الرئيسي</a>

    <div class="fixed top-4 right-4 z-50 toggle-bar">
        <button data-lang-toggle class="lang-toggle-btn cursor-pointer" aria-label="Toggle language">
            <span class="lang-icon">
                <svg class="lang-globe" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                EN
            </span>
        </button>
        <div class="toggle-divider"></div>
        <button id="themeToggleBtn" class="theme-toggle-btn cursor-pointer" aria-label="Toggle theme">
            <span class="icon-wrapper">
                <svg class="icon-sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg class="icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                <svg class="icon-system hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </span>
        </button>
    </div>

    <div class="w-full max-w-md" id="main-content" role="main">
        <div class="text-center mb-8">
            <a href="/index.html" class="inline-flex items-center gap-3 mb-6 group">
                <img src="/icon.svg" alt="SVU Community" class="w-16 h-16 object-contain transition-transform duration-300 group-hover:scale-105" width="60" height="60">
            </a>
            <h1 class="text-2xl font-bold gradient-text">SVU Community</h1>
        </div>

        <div class="glass rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-6 text-center" data-i18n="loginTitle">تسجيل الدخول</h2>

            <form id="loginForm" class="space-y-5" novalidate>
                <div>
                    <label class="block text-secondary-300 text-sm mb-2" for="loginIdentifier" data-i18n="loginEmail">البريد الإلكتروني</label>
                    <input type="email" id="loginIdentifier" required autocomplete="email"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 outline-none"
                        placeholder="أدخل بريدك الإلكتروني" aria-describedby="identifierHelp">
                    <p id="identifierHelp" class="text-xs text-secondary-500 mt-1">أدخل بريدك الإلكتروني</p>
                </div>

                <div>
                    <label class="block text-secondary-300 text-sm mb-2" for="loginPassword" data-i18n="loginPassword">كلمة المرور</label>
                    <div class="relative">
                        <input type="password" id="loginPassword" required autocomplete="current-password" minlength="8"
                            class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 outline-none pl-12"
                            data-i18n-placeholder="loginPassword" aria-describedby="passwordHelp">
                        <button type="button" id="togglePasswordBtn"
                            class="absolute left-3 top-1/2 -translate-y-1/2 text-secondary-400 hover:text-white transition cursor-pointer"
                            aria-label="Show password">
                            <svg id="toggleLoginPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                    <p id="passwordHelp" class="text-xs text-secondary-500 mt-1">8 أحرف على الأقل</p>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded border-secondary-600 bg-secondary-800 text-primary-500 focus:ring-primary-500 focus:ring-offset-0">
                        <span class="text-secondary-400 text-sm mr-2" data-i18n="loginRemember">تذكرني</span>
                    </label>
                    <button type="button" data-action="forgot-password-open" class="text-primary-400 hover:text-primary-300 text-sm transition" data-i18n="loginForgot">
                        نسيت كلمة المرور؟
                    </button>
                </div>

                <button type="submit" id="loginBtn"
                    class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50">
                    <span class="flex items-center justify-center gap-2">
                        <svg id="loginSpinner" class="hidden animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span data-i18n="loginBtn" id="loginBtnText">تسجيل الدخول</span>
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <span class="text-secondary-400 text-sm" data-i18n="loginNoAccount">ليس لديك حساب؟ </span>
                <a href="/register.html" class="text-primary-400 hover:text-primary-300 text-sm font-semibold transition" data-i18n="loginCreateAccount">
                    إنشاء حساب جديد
                </a>
            </div>
        </div>

        <div class="text-center mt-6">
            <a href="/index.html" class="text-secondary-400 hover:text-white text-sm transition flex items-center justify-center gap-2">
                <svg class="w-4 h-4 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span data-i18n="backToHome">العودة للرئيسية</span>
            </a>
        </div>
    </div>

    <div id="forgotPasswordModal" class="fixed inset-0 modal hidden items-center justify-center z-50 p-4" aria-hidden="true" role="dialog" aria-labelledby="forgotPasswordTitle" aria-modal="true">
        <div class="glass rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white" id="forgotPasswordTitle" data-i18n="forgotPassword">استعادة كلمة المرور</h3>
                <button data-action="forgot-password-close" type="button" class="text-secondary-400 hover:text-white transition cursor-pointer" aria-label="Close forgot password dialog">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <p class="text-secondary-300 text-sm mb-6" data-i18n="forgotPasswordDesc">
                أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
            </p>

            <form id="forgotPasswordForm" class="space-y-5" novalidate>
                <div>
                    <label class="block text-secondary-300 text-sm mb-2" for="resetEmail" data-i18n="registerEmail">البريد الإلكتروني</label>
                    <input type="email" id="resetEmail" required autocomplete="email"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-secondary-500 outline-none"
                        placeholder="email@example.com">
                </div>

                <button type="submit" id="resetBtn"
                    class="w-full py-3 bg-gradient-to-r from-primary-600 to-primary-500 hover:from-primary-500 hover:to-primary-400 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-primary-500/30">
                    <span data-i18n="forgotPasswordBtn">إرسال رابط الاستعادة</span>
                </button>
            </form>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 transform transition-all duration-300 z-[9999] opacity-0 translate-y-4 pointer-events-none"
         style="min-width: 250px;" role="status" aria-live="polite" aria-atomic="true">
        <div id="toastContent" class="text-white px-6 py-3 rounded-xl shadow-2xl border text-center font-medium"></div>
    </div>

    <script type="module" src="../js/modules/page-login.js"></script>
</body>
</html>
