<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="loginTitle">تسجيل الدخول - SVU Community</title>
    <meta name="description" content="تسجيل الدخول إلى SVU Community">
    <meta name="keywords" content="تسجيل الدخول، SVU Community، مجتمع جامعي، تقنية المعلومات">
    <meta name="author" content="SVU Community">
    <meta property="og:title" content="تسجيل الدخول - SVU Community">
    <meta property="og:description" content="تسجيل الدخول إلى SVU Community">
    <meta property="og:image" content="/icon.png">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="تسجيل الدخول - SVU Community">
    <meta name="twitter:description" content="تسجيل الدخول إلى SVU Community">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#02020a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://*.supabase.com 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com blob:; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.com wss://*.supabase.co wss://*.supabase.com; base-uri 'self';">

    <script type="module" src="../../env.js"></script>
    <script type="module" src="../js/modules/window-shim.js"></script>
    <script type="module" src="../app.js"></script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="alternate icon" href="/icon.ico">
    <link rel="stylesheet" href="/vendor/fonts/cairo.css">
    <link rel="stylesheet" href="/assets/styles.css">
    <link rel="stylesheet" href="/assets/login.css">
</head>
<body class="login-body min-h-screen flex items-center justify-center p-4">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:right-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-primary-600 focus:text-white focus:rounded-xl">تخطي إلى المحتوى الرئيسي</a>

    <!-- Starfield -->
    <div class="star-field" id="starField" aria-hidden="true"></div>

    <!-- Nebula orbs -->
    <div class="nebula-orb cyan" aria-hidden="true"></div>
    <div class="nebula-orb purple" aria-hidden="true"></div>
    <div class="nebula-orb indigo" aria-hidden="true"></div>

    <!-- Toggle bar -->
    <div class="fixed top-4 right-4 z-50 toggle-neon flex items-center px-1.5 py-1.5 gap-1">
        <button data-lang-toggle class="px-3 py-2 rounded-xl text-sm font-semibold text-secondary-300 hover:text-white transition cursor-pointer flex items-center gap-2" aria-label="Toggle language">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
            </svg>
            EN
        </button>
        <div class="toggle-divider-neon"></div>
        <button id="themeToggleBtn" class="px-3 py-2 rounded-xl text-secondary-300 hover:text-white transition cursor-pointer" aria-label="Toggle theme">
            <span class="flex items-center">
                <svg class="icon-sun hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg class="icon-moon hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                </svg>
                <svg class="icon-system hidden w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </span>
        </button>
    </div>

    <!-- Main content -->
    <div class="w-full max-w-md relative z-10" id="main-content" role="main">

        <!-- Logo + Title -->
        <div class="text-center mb-8 float-in">
            <a href="/index.html" class="inline-flex items-center justify-center mb-5 group logo-glow">
                <img src="/icon.svg" alt="SVU Community" class="w-[72px] h-[72px] object-contain logo-levitate" width="72" height="72">
            </a>
            <h1 class="text-3xl font-black neon-title">SVU Community</h1>
            <p class="text-secondary-400 text-sm mt-2 tracking-wide">Information Technology Community</p>
        </div>

        <!-- Login Card -->
        <div class="neon-card-wrap float-in-delay">
            <div class="neon-card p-8 relative z-10">
                <div class="relative z-10">

                    <h2 class="text-xl font-bold text-white mb-7 text-center neon-title" data-i18n="loginTitle">تسجيل الدخول</h2>

                    <form id="loginForm" class="space-y-5" novalidate>

                        <!-- Email -->
                        <div>
                            <label class="block text-secondary-300 text-xs font-semibold mb-2 uppercase tracking-wider" for="loginIdentifier" data-i18n="loginEmail">البريد الإلكتروني</label>
                            <input type="email" id="loginIdentifier" required autocomplete="email"
                                   class="neon-input w-full"
                                   placeholder="أدخل بريدك الإلكتروني"
                                   aria-describedby="identifierHelp">
                            <p id="identifierHelp" class="text-secondary-500 text-xs mt-1.5" data-i18n="loginEmailHelp">أدخل بريدك الإلكتروني</p>
                        </div>

                        <!-- Password -->
                        <div>
                            <label class="block text-secondary-300 text-xs font-semibold mb-2 uppercase tracking-wider" for="loginPassword" data-i18n="loginPassword">كلمة المرور</label>
                            <div class="relative">
                                <input type="password" id="loginPassword" required autocomplete="current-password" minlength="8"
                                       class="neon-input w-full"
                                       style="padding-left: 48px;"
                                       placeholder="أدخل كلمة المرور"
                                       aria-describedby="passwordHelp">
                                <button type="button" id="togglePasswordBtn"
                                        class="pwd-toggle absolute left-3 top-1/2 -translate-y-1/2 cursor-pointer p-1 rounded-lg"
                                        aria-label="Show password">
                                    <svg id="toggleLoginPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </button>
                            </div>
                            <p id="passwordHelp" class="text-secondary-500 text-xs mt-1.5">8 أحرف على الأقل</p>
                        </div>

                        <!-- Forgot password -->
                        <div class="text-center">
                            <button type="button" data-action="forgot-password-open"
                                    class="neon-link text-sm font-medium cursor-pointer bg-transparent border-none"
                                    data-i18n="loginForgot">
                                نسيت كلمة المرور؟
                            </button>
                        </div>

                        <!-- Submit -->
                        <button type="submit" id="loginBtn" class="neon-cta w-full flex items-center justify-center gap-2">
                            <svg id="loginSpinner" class="hidden animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span data-i18n="loginBtn" id="loginBtnText">تسجيل الدخول</span>
                        </button>
                    </form>

                    <!-- Register link -->
                    <div class="mt-7 text-center">
                        <span class="text-secondary-400 text-sm" data-i18n="loginNoAccount">ليس لديك حساب؟ </span>
                        <a href="/register.html" class="neon-link text-sm font-semibold" data-i18n="loginCreateAccount">
                            إنشاء حساب جديد
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Back to home -->
        <div class="text-center mt-6 float-in-delay">
            <a href="/index.html" class="text-secondary-400 hover:text-white text-sm transition inline-flex items-center gap-2 group">
                <svg class="w-4 h-4 rotate-180 transition-transform group-hover:-translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                <span data-i18n="backToHome">العودة للرئيسية</span>
            </a>
        </div>
    </div>

    <!-- Forgot password modal -->
    <div id="forgotPasswordModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="forgotPasswordTitle" aria-modal="true">
        <div class="neon-card max-w-md w-full p-8 relative z-10">
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold neon-title" id="forgotPasswordTitle" data-i18n="forgotPassword">استعادة كلمة المرور</h3>
                    <button data-action="forgot-password-close" type="button" class="text-secondary-400 hover:text-white transition p-1 rounded-lg cursor-pointer" aria-label="Close forgot password dialog">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <p class="text-secondary-300 text-sm mb-6 leading-relaxed" data-i18n="forgotPasswordDesc">
                    أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
                </p>

                <form id="forgotPasswordForm" class="space-y-5" novalidate>
                    <div>
                        <label class="block text-secondary-300 text-xs font-semibold mb-2 uppercase tracking-wider" for="resetEmail" data-i18n="registerEmail">البريد الإلكتروني</label>
                        <input type="email" id="resetEmail" required autocomplete="email"
                               class="neon-input w-full"
                               placeholder="email@example.com">
                    </div>

                    <button type="submit" id="resetBtn" class="neon-cta w-full">
                        <span data-i18n="forgotPasswordBtn">إرسال رابط الاستعادة</span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] opacity-0 translate-y-3 pointer-events-none transition-all duration-300 neon-toast px-6 py-3.5 rounded-2xl border text-center font-semibold text-white" role="status" aria-live="polite" aria-atomic="true" style="min-width: 280px;">
        <div id="toastContent" class="flex items-center justify-center gap-2"></div>
    </div>

    <script type="module" src="../js/modules/page-login.js"></script>

    <script>
        // Generate starfield
        (function() {
            const field = document.getElementById('starField');
            if (!field) return;
            const count = window.innerWidth < 768 ? 60 : 120;
            const frag = document.createDocumentFragment();
            for (let i = 0; i < count; i++) {
                const s = document.createElement('div');
                const isLarge = Math.random() < 0.08;
                s.className = 'star' + (isLarge ? ' large' : (Math.random() < 0.4 ? ' small' : ''));
                s.style.left = Math.random() * 100 + '%';
                s.style.top = Math.random() * 100 + '%';
                s.style.setProperty('--dur', (2 + Math.random() * 5) + 's');
                s.style.setProperty('--delay', (Math.random() * 5) + 's');
                s.style.animationDuration = s.style.getPropertyValue('--dur');
                frag.appendChild(s);
            }
            field.appendChild(frag);
        })();
    </script>
</body>
</html>
