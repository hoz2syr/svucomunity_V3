<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المقررات - SVU Community</title>
    <meta name="description" content="تصفح مقررات مجتمع تقنية المعلومات" />
    <meta name="theme-color" content="#0f172a" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://*.supabase.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.com wss://*.supabase.co wss://*.supabase.com; base-uri 'self';">

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="alternate icon" href="/icon.ico" />
    <link rel="stylesheet" href="/src/styles/main.css" />
    <link rel="stylesheet" href="/src/assets/auth.css" />
    <link rel="stylesheet" href="/vendor/fonts/cairo.css" />
</head>
<body class="min-h-screen bg-background text-white">
    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 right-0 h-full w-64 bg-surface/80 backdrop-blur-xl border-e border-white/10 z-40 transform transition-transform duration-300 translate-x-0 md:translate-x-0 -translate-x-full" role="navigation" aria-label="القائمة الرئيسية">
        <div class="p-6 flex items-center gap-3">
            <img src="/icon.svg" alt="" class="w-10 h-10" />
            <span class="text-xl font-bold gradient-text">SVU Community</span>
        </div>
        <nav class="px-4 space-y-1">
            <a href="/dashboard.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-secondary-300 hover:bg-white/5" data-page="dashboard">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m7-7l4 4 4-4M5 10h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V10z"/></svg>
                <span data-i18n="dashboard">لوحة التحكم</span>
            </a>
            <a href="/courses.html" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-xl text-white bg-primary-500/20" data-page="courses">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 4 6.253v13C4.832 18.477 6.418 18 8 18s3.168.477 4 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                <span data-i18n="courses">المقررات</span>
            </a>
        </nav>
        <div class="absolute bottom-4 left-4 right-4">
            <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 0 01-3 3H6a3 0 01-3-3V7a3 0 013-3h4a3 0 013 3v1"/></svg>
                <span data-i18n="logout">تسجيل الخروج</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="md:mr-64 p-4 md:p-8">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold" data-i18n="browseCourses">تصفح المقررات</h1>
                <p class="text-secondary-400 mt-1" data-i18n="coursesSubtitle">اكتشف مقررات مجتمع تقنية المعلومات وتابع تقدمك</p>
            </div>
            <div class="flex items-center gap-3">
                <button id="themeToggleBtn" class="p-2 rounded-xl glass hover:bg-white/10 transition" aria-label="Toggle theme">
                    <svg class="icon-sun w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <svg class="icon-moon w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.0 0012 21a9.003 9.0 008.354-5.646z"/></svg>
                    <svg class="icon-system w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 0 002-2V5a2 0 00-2-2H5a2 0 00-2 2v10a2 0 002 2z"/></svg>
                </button>
                <button id="langToggleBtn" class="p-2 rounded-xl glass hover:bg-white/10 transition font-bold text-sm" aria-label="Switch language">EN</button>
            </div>
        </header>

        <!-- Search / Filter -->
        <section class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
            <div class="relative w-full sm:w-80">
                <input type="search" id="courseSearch" placeholder="بحث في المقررات..." class="w-full pr-10 pl-4 py-2 rounded-xl bg-white/5 border border-white/10 text-white placeholder-secondary-500 outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/30" data-i18n-placeholder="searchCourses" />
                <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-secondary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <select id="semesterFilter" class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-white outline-none focus:border-primary-500">
                <option value="all" data-i18n="allSemesters">جميع الفصول</option>
                <option value="1" data-i18n="sem1">الفصل 1</option>
                <option value="2" data-i18n="sem2">الفصل 2</option>
                <option value="3" data-i18n="sem3">الفصل 3</option>
                <option value="4" data-i18n="sem4">الفصل 4</option>
                <option value="5" data-i18n="sem5">الفصل 5</option>
                <option value="6" data-i18n="sem6">الفصل 6</option>
                <option value="7" data-i18n="sem7">الفصل 7</option>
                <option value="8" data-i18n="sem8">الفصل 8</option>
            </select>
        </section>

        <!-- Courses Grid -->
        <section id="coursesSection">
            <h2 class="text-xl font-bold mb-4" data-i18n="allAvailableCourses">جميع المقررات المتاحة</h2>
            <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-secondary-400" data-i18n="loadingCourses">جاري تحميل المقررات...</p>
            </div>
        </section>
    </main>

    <script type="module" src="/src/js/modules/window-shim.js"></script>
    <script type="module" src="/src/js/modules/config.js"></script>
    <script type="module" src="/src/js/modules/core.js"></script>
    <script type="module" src="/src/js/modules/shared.js"></script>
    <script type="module" src="/src/js/modules/i18n.js"></script>
</body>
</html>
