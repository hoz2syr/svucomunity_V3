<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVU Community - مجتمع تقنية المعلومات</title>
    <meta name="description" content="مجتمع طلاب تقنية المعلومات في الجامعة السورية الافتراضية - انضم لمجموعات دراسية وشارك المقررات">
    <meta name="keywords" content="SVU, سورية, افتراضية, تقنية, معلومات, مجتمع, مجموعات, مقررات">
    <meta name="author" content="SVU Community">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#0f172a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://*.supabase.co https://*.supabase.com 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com blob:; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://*.supabase.com wss://*.supabase.co wss://*.supabase.com; base-uri 'self';">


    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="alternate icon" href="/icon.ico">

    <link rel="stylesheet" href="vendor/fonts/cairo.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="fixed top-4 right-4 z-50 toggle-bar" data-tour="lang-theme">
        <button data-lang-toggle
            data-tooltip="tipLangToggle"
            class="lang-toggle-btn" aria-label="Toggle language">
            <span class="lang-icon">
                <svg class="lang-globe" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
                EN
            </span>
        </button>
        <div class="toggle-divider"></div>
        <button id="themeToggleBtn"
            data-tooltip="tipThemeToggle"
            class="theme-toggle-btn" aria-label="Toggle theme">
            <span class="icon-wrapper">
                <svg class="icon-sun hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                <svg class="icon-moon hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.0 0 0012 21a9.003 9.0 0 008.354-5.646z"/>
                </svg>
                <svg class="icon-system hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
            </span>
        </button>
    </div>

    <main class="text-center">
        <div class="floating mb-6">
            <img src="/icon.svg" alt="SVU Community" class="w-[84px] h-[84px] object-contain" width="84" height="84">
        </div>
            <span class="text-4xl font-bold gradient-text mb-4">SVU Community</span>
        <p class="text-secondary-400 text-lg mb-8" data-i18n="appTagline">مجتمع تقنية المعلومات</p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="login.html" class="px-8 py-3 bg-primary-600 hover:bg-primary-500 text-white rounded-xl font-semibold transition-all duration-300 shadow-lg hover:shadow-primary-500/50 hover:-translate-y-1" data-i18n="login">
                تسجيل الدخول
            </a>
            <a href="register.html" class="px-8 py-3 glass hover:bg-white/10 text-white rounded-xl font-semibold transition-all duration-300 border border-white/20 hover:-translate-y-1" data-i18n="register">
                إنشاء حساب
            </a>
        </div>
    </main>

    <div class="mpb-wrap fixed bottom-8 left-1/2 -translate-x-1/2 z-40">
        <div class="mpb-badge" id="mpbBadge">
            <div class="mpb-particles" id="mpbParticles"></div>
            <div class="mpb-glow"></div>
            <span class="mpb-dot"></span>
            <span class="mpb-label">made possible by</span>
            <span class="mpb-word" id="mpbWord">you</span>
        </div>
    </div>

    <style>
        .mpb-badge{display:inline-flex;align-items:center;gap:10px;padding:10px 22px;border-radius:999px;background:rgba(129,140,248,0.12);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);position:relative;overflow:hidden;cursor:pointer;transition:all 0.3s ease;animation:mpb-float 3s ease-in-out infinite}
        .mpb-badge::before{content:'';position:absolute;inset:0;border-radius:999px;padding:1.5px;background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc,#38bdf8);background-size:300% 300%;animation:mpb-gradient-shift 4s ease infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
        .mpb-badge::after{content:'';position:absolute;inset:-2px;border-radius:999px;background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc,#38bdf8);background-size:300% 300%;animation:mpb-gradient-shift 4s ease infinite;opacity:0.25;filter:blur(12px);z-index:-1;pointer-events:none}
        .mpb-badge:hover{background:rgba(129,140,248,0.2);transform:translateY(-2px)}
        .mpb-glow{position:absolute;inset:0;border-radius:999px;background:radial-gradient(ellipse at center,rgba(129,140,248,0.15) 0%,transparent 70%);animation:mpb-pulse-glow 2s ease-in-out infinite;pointer-events:none}
        .mpb-label{font-size:13px;color:rgba(255,255,255,0.55);letter-spacing:0.04em;white-space:nowrap;position:relative;z-index:1}
        .mpb-word{font-size:13px;font-weight:600;color:#818cf8;white-space:nowrap;min-width:60px;transition:opacity 0.15s ease,transform 0.15s ease;position:relative;z-index:1}
        .mpb-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#818cf8,#c084fc);flex-shrink:0;position:relative;z-index:1;box-shadow:0 0 8px rgba(129,140,248,0.6);animation:mpb-dot-pulse 2s ease-in-out infinite}
        .mpb-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit;z-index:2}
        .mpb-p{position:absolute;width:3px;height:3px;border-radius:50%;background:#818cf8;opacity:0}
        @keyframes mpb-gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes mpb-pulse-glow{0%,100%{opacity:0.3}50%{opacity:0.8}}
        @keyframes mpb-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
        @keyframes mpb-dot-pulse{0%,100%{box-shadow:0 0 6px rgba(129,140,248,0.4)}50%{box-shadow:0 0 14px rgba(129,140,248,0.9)}}
    </style>

    <script src="env.js"></script>
    <script type="module" src="src/app.js"></script>
</body>
</html>
