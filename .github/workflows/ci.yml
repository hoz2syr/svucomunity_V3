name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard against client-exposed secrets
        run: |
          if grep -R --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' --include='*.env*' -nE 'VITE_SUPABASE_SERVICE_ROLE_KEY|VITE_GEMINI_API_KEY|VITE_RESEND_API_KEY' .; then
            echo '::error::Client-exposed secret detected in tracked files. Remove any VITE_-prefixed SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY, or RESEND_API_KEY before building.'
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npm test

  build:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npm run build

  deploy-supabase:
    needs: [build]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations to Supabase
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
