name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Guard against client-exposed secrets
        run: |
          if grep -R --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' --include='*.env*' \
            -nE 'VITE_SUPABASE_SERVICE_ROLE_KEY|VITE_GEMINI_API_KEY|VITE_RESEND_API_KEY' .; then
            echo '::error::Client-exposed secret detected!'
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npm test

  build:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --force
      - run: npm run build

  deploy-supabase:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Repair migration history
        run: supabase migration repair --status reverted 20250620
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push DB migrations
        run: echo "Y" | supabase db push

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}

      - name: Deploy Edge Functions
        run: supabase functions deploy delete-account --no-verify-jwt
