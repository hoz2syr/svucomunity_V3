---
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against client-exposed secrets
        run: |
          if grep -R --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' --include='*.env*' -nE 'VITE_SUPABASE_SERVICE_ROLE_KEY|VITE_GEMINI_API_KEY|VITE_RESEND_API_KEY' .; then
            echo '::error::Client-exposed secret detected in tracked files. Remove any VITE_-prefixed SUPABASE_SERVICE_ROLE_KEY, GEMINI_API_KEY, or RESEND_API_KEY before building.'
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    fail-fast: false

    strategy:
      matrix:
        package:
          - apps/web

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        run: npm run test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package }}/coverage/
          retention-days: 30
