project_id = "YOUR_PROJECT_ID"  # استبدلها بمعرف مشروعك الحقيقي

[auth]
enabled = true
email.enabled = true
email.auto_confirm = false
email.double_confirm_changes = true
mfa.enabled = true
password_policy = "strong"
max_password_length = 72
site_url = "https://svu-community.vercel.app"
additional_redirect_urls = ["https://svu-community.vercel.app/auth/callback"]

[cors]
allowed_origins = [
  "https://svu-community.vercel.app",
  "http://localhost:5173",
  "http://localhost:3000",
  "http://localhost:5174"
]
methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
headers = ["authorization", "x-client-info", "apikey", "content-type"]

[functions.send-email]
verify_jwt = true

[functions.ocr-proxy]
verify_jwt = true

[functions.gemini-proxy]
verify_jwt = true

[functions.admin-actions]
verify_jwt = true
