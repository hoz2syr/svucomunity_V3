project_id = "svu-community"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]

[auth]
enabled = true
external_url = "http://localhost:3000"
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://*.supabase.co"]

jwt_expiry = 86400
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 60
enable_signup = true

[auth.email]
double_confirm_changes = true
enable_confirmations = true

# SMTP settings (configure via Supabase Dashboard in production)
# [smtp]
# enabled = true
# host = "smtp.your-provider.com"
# port = 587
# user = "your-email@domain.com"
# pass = "your-smtp-password"
# admin_email = "admin@domain.com"

[functions."rate-test"]
verify_jwt = true

[functions.delete-account]
verify_jwt = true

[functions.auth-login]
verify_jwt = false

[functions.auth-register]
verify_jwt = false
