<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asme</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "framer-motion": "https://esm.sh/framer-motion@10.18.0?external=react,react-dom",
            "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react,react-dom"
        }
    }
    </script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            margin: 0;
        }

        .font-serif {
            font-family: "Instrument Serif", Georgia, serif;
        }

        .liquid-glass {
            background: rgba(255,255,255,0.01);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1.4px;
            background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            border-radius: inherit;
            pointer-events: none;
        }

        .glass-pill {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(16px) saturate(180%);
            border-radius: 9999px;
            box-shadow: none !important;
        }

        ::selection {
            background-color: white;
            color: black;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="error" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; color: #fff; padding: 20px; font-family: monospace; z-index: 9999; overflow: auto;"></div>

    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        try {
            console.log('Starting React app...');
            import React, { useState, useEffect, useRef } from 'react';
            import { createRoot } from 'react-dom/client';
            import { motion, AnimatePresence } from 'framer-motion';
            import { Globe, ArrowRight, Check } from 'lucide-react';
            console.log('All imports loaded successfully');

            const HLS_URL = 'https://stream.mux.com/kimF2ha9zLrX64H00UgLGPflCzNtl1T0215MlAmeOztv8.m3u8';

            function BackgroundVideo() {
                const videoRef = useRef(null);

                useEffect(() => {
                    const video = videoRef.current;
                    if (!video) return;

                    console.log('BackgroundVideo mounted, checking video support');
                    
                    if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        console.log('Using native HLS support');
                        video.src = HLS_URL;
                    } else if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                        console.log('Using HLS.js');
                        const hls = new Hls();
                        hls.loadSource(HLS_URL);
                        hls.attachMedia(video);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => {
                            console.log('HLS manifest parsed, playing video');
                            video.play().catch(e => console.log('Video play error:', e));
                        });
                        hls.on(Hls.Events.ERROR, (event, data) => {
                            console.log('HLS error:', data);
                        });
                    } else {
                        console.log('HLS not supported');
                    }
                }, []);

                return (
                    <div className="absolute inset-0 overflow-hidden pointer-events-none">
                        <video
                            ref={videoRef}
                            autoPlay
                            muted
                            loop
                            playsInline
                            className="w-full h-full object-cover opacity-100"
                        />
                    </div>
                );
            }

            function Navbar() {
                return (
                    <motion.nav
                        initial={{ y: -20, opacity: 0 }}
                        animate={{ y: 0, opacity: 1 }}
                        className="relative z-20 px-6 py-6 w-full"
                        style={{ fontFamily: "'Inter', ui-sans-serif, system-ui, sans-serif" }}
                    >
                        <div className="liquid-glass rounded-full px-6 py-3 flex items-center justify-between max-w-5xl mx-auto">
                            <div className="flex items-center gap-8">
                                <div className="flex items-center gap-2">
                                    <Globe className="w-6 h-6 text-white" />
                                    <span className="text-white font-semibold text-lg">Asme</span>
                                </div>
                                <div className="hidden md:flex items-center gap-8 text-white/80 text-sm font-medium">
                                    <a href="#" className="hover:text-white transition-colors duration-300">Features</a>
                                    <a href="#" className="hover:text-white transition-colors duration-300">Pricing</a>
                                    <a href="#" className="hover:text-white transition-colors duration-300">About</a>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <button className="text-white hover:text-white/80 transition-colors text-sm font-medium cursor-pointer">Sign Up</button>
                                <button className="liquid-glass rounded-full px-6 py-2 text-sm font-medium text-white hover:opacity-90 transition-opacity cursor-pointer">Login</button>
                            </div>
                        </div>
                    </motion.nav>
                );
            }

            function Hero() {
                const [showForm, setShowForm] = useState(false);
                const [inputValue, setInputValue] = useState('');
                const [isSubmitted, setIsSubmitted] = useState(false);
                const [displayedPlaceholder, setDisplayedPlaceholder] = useState('');
                const typewriterRef = useRef(null);

                useEffect(() => {
                    if (!showForm) return;

                    const text = isSubmitted
                        ? 'You Will Receive Notifications By Email'
                        : 'Enter Your Email Here For Early Access';

                    setDisplayedPlaceholder('');
                    let index = 0;
                    typewriterRef.current = setInterval(() => {
                        index++;
                        setDisplayedPlaceholder(text.slice(0, index));
                        if (index >= text.length) {
                            clearInterval(typewriterRef.current);
                        }
                    }, 60);

                    return () => clearInterval(typewriterRef.current);
                }, [showForm, isSubmitted]);

                const handleSubmit = (e) => {
                    e.preventDefault();
                    setIsSubmitted(true);
                    setTimeout(() => {
                        setShowForm(false);
                        setIsSubmitted(false);
                        setInputValue('');
                        setDisplayedPlaceholder('');
                    }, 4000);
                };

                const handleButtonClick = () => {
                    setShowForm(true);
                };

                return (
                    <section className="relative flex-1 flex flex-col items-center justify-center px-6">
                        <div className="relative z-10 text-center max-w-5xl mx-auto flex flex-col items-center justify-center w-full gap-12">
                            <motion.p
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ delay: 0.1 }}
                                className="text-white/80 text-[10px] md:text-[11px] font-medium tracking-[0.2em] uppercase mb-4"
                            >
                                BUILD A NO-CODE AI APP IN MINUTES
                            </motion.p>

                            <motion.h1
                                initial={{ opacity: 0, y: 20 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 1, ease: [0.16, 1, 0.3, 1] }}
                                className="text-4xl md:text-[64px] font-medium tracking-[-0.01em] leading-[1.1] mb-6 bg-gradient-to-b from-white via-white/95 to-white/70 bg-clip-text text-transparent max-w-4xl"
                                style={{ fontFamily: "'Instrument Serif', serif" }}
                            >
                                A new way to think and create with computers
                                <br className="hidden md:block" />
                            </motion.h1>

                            <motion.div
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ delay: 0.4 }}
                                className="min-h-[50px] mt-2 flex flex-col items-center"
                            >
                                <AnimatePresence mode="wait">
                                    {!showForm ? (
                                        <motion.button
                                            key="cta-button"
                                            initial={{ scale: 0.95 }}
                                            animate={{ scale: 1 }}
                                            exit={{ scale: 0.95 }}
                                            transition={{ duration: 0.2 }}
                                            onClick={handleButtonClick}
                                            className="px-10 py-3 text-[14px] font-medium border border-white/10 rounded-full hover:border-white/30 hover:bg-white/[0.02] transition-all duration-300 text-white/90 backdrop-blur-sm cursor-pointer"
                                        >
                                            Get early access
                                        </motion.button>
                                    ) : (
                                        <motion.form
                                            key="cta-form"
                                            initial={{ scale: 0.95 }}
                                            animate={{ scale: 1 }}
                                            exit={{ scale: 0.95 }}
                                            transition={{ duration: 0.2 }}
                                            onSubmit={handleSubmit}
                                            className="flex items-center gap-2 pl-5 pr-1.5 py-1.5 text-[14px] font-medium border border-white/20 rounded-full bg-white/[0.02] backdrop-blur-sm w-full max-w-[320px] focus-within:border-white/40 transition-colors duration-300"
                                        >
                                            <input
                                                type="email"
                                                value={inputValue}
                                                onChange={(e) => setInputValue(e.target.value)}
                                                placeholder={displayedPlaceholder}
                                                autoFocus
                                                className="bg-transparent text-white placeholder-white/45 outline-none flex-1 min-w-0 text-sm"
                                                required
                                            />
                                            <button
                                                type="submit"
                                                className="flex items-center justify-center w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 transition-colors cursor-pointer"
                                            >
                                                {isSubmitted ? (
                                                    <Check className="w-4 h-4 text-white" />
                                                ) : (
                                                    <ArrowRight className="w-4 h-4 text-white" />
                                                )}
                                            </button>
                                        </motion.form>
                                    )}
                                </AnimatePresence>
                            </motion.div>

                            <motion.div
                                initial={{ opacity: 0, y: 10 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ delay: 0.8 }}
                            >
                                <button className="text-white/80 hover:text-white/40 transition-colors duration-300 text-[13px] font-medium tracking-wide cursor-pointer">
                                    Play Video Demo
                                </button>
                            </motion.div>
                        </div>
                    </section>
                );
            }

            function App() {
                return (
                    <main className="relative bg-black h-screen w-screen flex flex-col overflow-hidden selection:bg-white selection:text-black flex-shrink-0">
                        <BackgroundVideo />
                        <Navbar />
                        <Hero />
                    </main>
                );
            }

            console.log('Rendering React app...');
            const root = createRoot(document.getElementById('root'));
            root.render(<App />);
            console.log('React app rendered successfully');
        } catch (error) {
            console.error('Error rendering app:', error);
            const errorDiv = document.getElementById('error');
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = 'Error: ' + error.message + '\n\n' + error.stack;
            }
        }
    </script>
</body>
</html>
