    <!-- Made Possible By Badge -->
    <div class="mpb-wrap fixed bottom-8 left-1/2 -translate-x-1/2 z-40">
        <div class="mpb-badge" id="mpbBadge">
            <div class="mpb-particles" id="mpbParticles"></div>
            <div class="mpb-glow"></div>
            <span class="mpb-dot"></span>
            <span class="mpb-label">made possible by</span>
            <span class="mpb-word" id="mpbWord">you</span>
        </div>
    </div>

    <style>
        .mpb-badge{display:inline-flex;align-items:center;gap:10px;padding:10px 22px;border-radius:999px;background:rgba(129,140,248,0.12);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);position:relative;overflow:hidden;cursor:pointer;transition:all 0.3s ease;animation:mpb-float 3s ease-in-out infinite}
        .mpb-badge::before{content:'';position:absolute;inset:0;border-radius:999px;padding:1.5px;background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc,#38bdf8);background-size:300% 300%;animation:mpb-gradient-shift 4s ease infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
        .mpb-badge::after{content:'';position:absolute;inset:-2px;border-radius:999px;background:linear-gradient(135deg,#38bdf8,#818cf8,#c084fc,#38bdf8);background-size:300% 300%;animation:mpb-gradient-shift 4s ease infinite;opacity:0.25;filter:blur(12px);z-index:-1;pointer-events:none}
        .mpb-badge:hover{background:rgba(129,140,248,0.2);transform:translateY(-2px)}
        .mpb-glow{position:absolute;inset:0;border-radius:999px;background:radial-gradient(ellipse at center,rgba(129,140,248,0.15) 0%,transparent 70%);animation:mpb-pulse-glow 2s ease-in-out infinite;pointer-events:none}
        .mpb-label{font-size:13px;color:rgba(255,255,255,0.55);letter-spacing:0.04em;white-space:nowrap;position:relative;z-index:1}
        .mpb-word{font-size:13px;font-weight:600;color:#818cf8;white-space:nowrap;min-width:60px;transition:opacity 0.15s ease,transform 0.15s ease;position:relative;z-index:1}
        .mpb-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#818cf8,#c084fc);flex-shrink:0;position:relative;z-index:1;box-shadow:0 0 8px rgba(129,140,248,0.6);animation:mpb-dot-pulse 2s ease-in-out infinite}
        .mpb-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:inherit;z-index:2}
        .mpb-p{position:absolute;width:3px;height:3px;border-radius:50%;background:#818cf8;opacity:0}
        @keyframes mpb-gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        @keyframes mpb-pulse-glow{0%,100%{opacity:0.3}50%{opacity:0.8}}
        @keyframes mpb-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
        @keyframes mpb-dot-pulse{0%,100%{box-shadow:0 0 6px rgba(129,140,248,0.4)}50%{box-shadow:0 0 14px rgba(129,140,248,0.9)}}
    </style>

    <script>
    (function(){
        var words = ['you','الطلاب','المجتمع','us','SVU','الجميع','love','you'];
        var idx = 0;
        var wordEl = document.getElementById('mpbWord');
        var badge = document.getElementById('mpbBadge');
        var particles = document.getElementById('mpbParticles');
        var typed = '';
        var typingTimer = null;
        var autoTimer = null;
        var isTyping = false;

        function spawnParticles(){
            for(var i=0;i<8;i++){
                (function(i){
                    var p=document.createElement('div');
                    p.className='mpb-p';
                    var angle=Math.random()*Math.PI*2;
                    var dist=30+Math.random()*20;
                    p.style.left=(40+Math.random()*20)+'%';
                    p.style.top=(30+Math.random()*40)+'%';
                    p.style.width=(2+Math.random()*3)+'px';
                    p.style.height=p.style.width;
                    p.style.background=['#818cf8','#38bdf8','#c084fc','#34d399'][Math.floor(Math.random()*4)];
                    particles.appendChild(p);
                    var tx=Math.cos(angle)*dist;
                    var ty=Math.sin(angle)*dist;
                    setTimeout(function(){
                        p.style.transition='all 0.7s cubic-bezier(0.25,0.46,0.45,0.94)';
                        p.style.opacity='0.8';
                        p.style.transform='translate('+tx+'px,'+ty+'px) scale(0)';
                        setTimeout(function(){
                            p.style.opacity='0';
                            setTimeout(function(){ p.remove(); },300);
                        },500);
                    },i*40);
                })(i);
            }
        }

        function setWord(w, animate){
            if(animate){
                wordEl.style.opacity='0';
                wordEl.style.transform='translateY(8px) scale(0.9)';
                setTimeout(function(){
                    wordEl.textContent=w;
                    wordEl.style.transform='translateY(-6px) scale(1.05)';
                    setTimeout(function(){
                        wordEl.style.opacity='1';
                        wordEl.style.transform='translateY(0) scale(1)';
                        spawnParticles();
                    },50);
                },150);
            } else {
                wordEl.textContent=w;
            }
        }

        function startAuto(){
            clearInterval(autoTimer);
            autoTimer=setInterval(function(){
                if(isTyping) return;
                idx=(idx+1)%words.length;
                setWord(words[idx],true);
            },2000);
        }

        startAuto();

        document.addEventListener('keydown',function(e){
            if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA') return;
            if(e.key==='Backspace'){ typed=typed.slice(0,-1); }
            else if(e.key.length===1){ typed+=e.key; }
            else { return; }
            isTyping=true;
            clearTimeout(typingTimer);
            if(typed){
                setWord(typed,false);
                wordEl.style.color='#34d399';
            } else {
                wordEl.style.color='#818cf8';
                setWord('you',true);
            }
            typingTimer=setTimeout(function(){
                if(!typed){ isTyping=false; }
            },3000);
        });

        badge.addEventListener('click',function(){
            if(!isTyping){
                idx=(idx+1)%words.length;
                setWord(words[idx],true);
            }
        });
    })();
    </script>
